name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/nuget.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore WindowsUtilityPack.sln

      - name: Build
        run: dotnet build WindowsUtilityPack.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test tests/WindowsUtilityPack.Tests/WindowsUtilityPack.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/WindowsUtilityPack.Tests/TestResults/results.trx
          retention-days: 14
