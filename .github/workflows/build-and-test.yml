name: Build and Test
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore WindowsUtilityPack.sln

      - name: Build solution
        run: dotnet build WindowsUtilityPack.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/WindowsUtilityPack.Tests/WindowsUtilityPack.Tests.csproj --configuration Release --no-build --verbosity normal